<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>靴占いサイト（3D / Blenderモデル対応版）</title>
<style>
  :root {
    --sky-top: #8ecbf0;
    --sky-bottom: #c5e7fb;
    --ink: #163a4f;
    --accent: #2b6f9e;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", system-ui, sans-serif;
    color: var(--ink);
    background: var(--sky-top);
    overflow: hidden;
  }

  .stage {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  /* Three.js のキャンバス（背景の空・雲の上に重ねる） */
  #scene3d { position: absolute; inset: 0; z-index: 2; }
  #scene3d canvas { display: block; }

  /* 雲の飾り（2D） */
  .cloud {
    position: absolute; z-index: 1;
    background: rgba(255,255,255,.75);
    border-radius: 50px;
    filter: blur(.5px);
  }
  .cloud::before, .cloud::after {
    content: ""; position: absolute; background: inherit; border-radius: 50%;
  }
  .cloud.a { width: 90px; height: 28px; top: 14%; left: -20px; }
  .cloud.a::before { width: 44px; height: 44px; top: -22px; left: 14px; }
  .cloud.a::after  { width: 30px; height: 30px; top: -14px; left: 50px; }
  .cloud.b { width: 70px; height: 22px; top: 30%; right: -15px; opacity: .7; }
  .cloud.b::before { width: 34px; height: 34px; top: -16px; left: 10px; }
  .cloud.b::after  { width: 24px; height: 24px; top: -10px; left: 38px; }

  /* 案内 */
  .hint {
    position: absolute; z-index: 3;
    left: 0; right: 0; bottom: 16px;
    text-align: center;
    font-size: 14px; font-weight: 700;
    color: var(--accent);
    pointer-events: none;
    transition: opacity .3s;
  }
  .arrow {
    position: absolute; z-index: 3;
    left: 50%; bottom: 40px;
    transform: translateX(-50%);
    font-size: 22px; color: var(--accent);
    animation: bob 1.2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes bob {
    0%,100% { transform: translateX(-50%) translateY(0); opacity: .5; }
    50%     { transform: translateX(-50%) translateY(-8px); opacity: 1; }
  }

  /* 掛け声 */
  .chant {
    position: absolute; z-index: 4;
    left: 50%; top: 24%;
    transform: translate(-50%, -50%) scale(.6) rotate(-4deg);
    font-size: 30px; font-weight: 900; color: #fff;
    text-shadow: 0 2px 0 var(--accent), 0 0 14px rgba(43,111,158,.6);
    white-space: nowrap; letter-spacing: 1px;
    opacity: 0; pointer-events: none;
  }
  .chant.show { animation: chantPop 1.2s ease-out forwards; }
  @keyframes chantPop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(.6) rotate(-4deg); }
    25%  { opacity: 1; transform: translate(-50%, -55%) scale(1.12) rotate(-4deg); }
    55%  { opacity: 1; transform: translate(-50%, -62%) scale(1) rotate(-4deg); }
    100% { opacity: 0; transform: translate(-50%, -78%) scale(1) rotate(-4deg); }
  }

  /* 結果オーバーレイ */
  .result {
    position: absolute; inset: 0; z-index: 6;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    background: rgba(255,255,255,.82);
    backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none;
    transition: opacity .4s;
    text-align: center; padding: 20px;
  }
  .result.show { opacity: 1; pointer-events: auto; }
  .result .emoji { font-size: 80px; line-height: 1; }
  .result .face  { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
  .result .weather { font-size: 30px; font-weight: 800; margin: 2px 0; }
  .result .msg { font-size: 14px; opacity: .8; max-width: 220px; }
  .result button {
    margin-top: 14px; border: none;
    background: var(--accent); color: #fff;
    font-weight: 800; font-size: 15px;
    padding: 11px 26px; border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(43,111,158,.4);
    transition: transform .1s, filter .2s;
  }
  .result button:active { transform: translateY(1px); }
  .result button:hover { filter: brightness(1.08); }

  /* モデル読込中／注意書き */
  .note {
    position: absolute; z-index: 3;
    left: 50%; top: 12px;
    transform: translateX(-50%);
    font-size: 12px; font-weight: 700;
    color: var(--accent);
    background: rgba(255,255,255,.6);
    padding: 5px 12px; border-radius: 999px;
    pointer-events: none;
    transition: opacity .4s;
  }
</style>
<!-- Three.js を読み込む（Live Server などローカルサーバー経由で開いてください） -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <main class="stage" id="stage">
    <div class="cloud a"></div>
    <div class="cloud b"></div>

    <div id="scene3d"></div>

    <div class="note" id="note">仮の靴を表示中（shoe.glb を置くと差し替わります）</div>
    <div class="chant" id="chant">あした天気にな～れ</div>

    <div class="arrow" id="arrow">↑</div>
    <div class="hint" id="hint">靴を上にスワイプして飛ばそう</div>

    <div class="result" id="result">
      <div class="emoji" id="rEmoji">☀️</div>
      <div class="face" id="rFace">おもて</div>
      <div class="weather" id="rWeather">晴れ</div>
      <div class="msg" id="rMsg"></div>
      <button id="again">もう一度占う</button>
    </div>
  </main>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* =========================================================
   ★ 設定：Blender から書き出した靴をここで指定
   - Blender: ファイル → エクスポート → glTF 2.0 (.glb) を選び
     このHTMLと同じフォルダに shoe.glb として保存
   - サイズ/向きが合わない時は下の3つの数値を調整
   ========================================================= */
const MODEL_URL   = './shoe.glb';   // 靴モデルのファイル名
const TARGET_SIZE = 2.4;            // 画面内でのおおよその大きさ
const MODEL_ROT   = { x: 0, y: 0, z: 0 };  // 初期の向き補正（ラジアン）

const outcomes = [
  { face: 'おもて', emoji: '☀️', weather: '晴れ',   msg: '靴がきれいに表向き。気持ちのいい一日になりそう。' },
  { face: 'うら',   emoji: '🌧️', weather: '雨',     msg: '靴は裏返し。傘を持っていくと安心かも。' },
  { face: 'よこ',   emoji: '☁️', weather: 'くもり', msg: '靴が横向きで着地。どっちつかずの空模様。' },
];

const stage  = document.getElementById('stage');
const host   = document.getElementById('scene3d');
const note   = document.getElementById('note');
const arrow  = document.getElementById('arrow');
const hint   = document.getElementById('hint');
const chant  = document.getElementById('chant');
const result = document.getElementById('result');
const again  = document.getElementById('again');

// ---- Three.js 基本セットアップ ----
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(host.clientWidth, host.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
host.appendChild(renderer.domElement);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(42, host.clientWidth / host.clientHeight, 0.1, 100);
camera.position.set(0, 1.4, 7);
camera.lookAt(0, 0.4, 0);

// ---- ライト ----
scene.add(new THREE.HemisphereLight(0xffffff, 0x9ec6de, 1.05));
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(3, 6, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 20;
sun.shadow.camera.left = -5; sun.shadow.camera.right = 5;
sun.shadow.camera.top = 5;   sun.shadow.camera.bottom = -5;
scene.add(sun);

// ---- 地面（影を受ける・見た目は透明） ----
const GROUND_Y = -1.3;
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.ShadowMaterial({ opacity: 0.28 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = GROUND_Y;
ground.receiveShadow = true;
scene.add(ground);

// ---- 靴を運ぶグループ（位置＝放物線） / 中の pivot（回転） ----
const flyer = new THREE.Group();          // 位置
const pivot = new THREE.Group();          // 回転（靴の中心まわり）
flyer.add(pivot);
scene.add(flyer);

const REST_Y = -0.2;
flyer.position.set(0, REST_Y, 0);

let shoe = null;   // 実際のモデル or プレースホルダー

// ---- 仮の靴（GLBが無い時のプレースホルダー） ----
function buildPlaceholder() {
  const g = new THREE.Group();
  const light = new THREE.MeshStandardMaterial({ color: 0xdfeefa, roughness: .55, metalness: .05 });
  const blue  = new THREE.MeshStandardMaterial({ color: 0x2b6f9e, roughness: .5 });
  const dark  = new THREE.MeshStandardMaterial({ color: 0x2b3b44, roughness: .8 });

  // 靴底（裏＝うら側）
  const sole = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.32, 0.95), dark);
  sole.position.y = -0.55;
  g.add(sole);

  // 中底（白）
  const mid = new THREE.Mesh(new THREE.BoxGeometry(2.25, 0.18, 0.9), light);
  mid.position.y = -0.36;
  g.add(mid);

  // かかと側の本体
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.25, 0.75, 0.85), light);
  body.position.set(-0.45, 0.05, 0);
  g.add(body);

  // つま先（丸み）
  const toe = new THREE.Mesh(new THREE.SphereGeometry(0.48, 24, 16), light);
  toe.scale.set(1.4, 0.85, 0.9);
  toe.position.set(0.65, -0.18, 0);
  g.add(toe);

  // 履き口まわりのアクセント
  const collar = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.2, 0.88), blue);
  collar.position.set(-0.5, 0.42, 0);
  g.add(collar);

  // ベロ
  const tongue = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.7), blue);
  tongue.position.set(0.15, 0.28, 0);
  g.add(tongue);

  g.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
  return g;
}

// ---- モデルを中央寄せ＆サイズ正規化して設置 ----
function placeShoe(obj3d) {
  const box = new THREE.Box3().setFromObject(obj3d);
  const size = new THREE.Vector3(); box.getSize(size);
  const center = new THREE.Vector3(); box.getCenter(center);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const s = TARGET_SIZE / maxDim;

  const wrap = new THREE.Group();
  obj3d.position.sub(center);      // 中心を原点へ
  wrap.add(obj3d);
  wrap.scale.setScalar(s);
  wrap.rotation.set(MODEL_ROT.x, MODEL_ROT.y, MODEL_ROT.z);

  shoe = wrap;
  pivot.add(wrap);
}

// GLB を読み込み、無ければプレースホルダー
const loader = new GLTFLoader();
loader.load(
  MODEL_URL,
  (gltf) => {
    gltf.scene.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
    placeShoe(gltf.scene);
    note.textContent = 'Blenderの靴を表示中';
    setTimeout(() => note.style.opacity = '0', 1500);
  },
  undefined,
  () => {   // 読込失敗（ファイルが無い等）→ 仮の靴
    placeShoe(buildPlaceholder());
    setTimeout(() => note.style.opacity = '0', 2600);
  }
);

// =========================================================
//   飛ばす処理
// =========================================================
let state = 'idle';           // idle / drag / flying / result
let flightStart = 0;
let flight = null;
let clock = 0;

function pickOutcome() {
  return outcomes[Math.floor(Math.random() * outcomes.length)];
}

function fly(power, driftX) {
  if (state === 'flying') return;
  const outcome = pickOutcome();

  const spins   = 3 + Math.floor(Math.random() * 2);        // 3〜4回転
  const endRotX = spins * Math.PI * 2 + (outcome.face === 'うら' ? Math.PI : 0);
  const endRotZ = outcome.face === 'よこ' ? Math.PI / 2 : 0;
  const spinY   = (Math.random() < 0.5 ? 1 : -1) * Math.PI * 2;

  flight = {
    outcome,
    dur: 1750,
    upH: Math.min(4.8, 3.2 * power),
    drift: driftX,
    zPop: 1.4 * power,
    startRotX: pivot.rotation.x,
    startRotY: pivot.rotation.y,
    startRotZ: pivot.rotation.z,
    endRotX, endRotY: pivot.rotation.y + spinY, endRotZ,
  };

  state = 'flying';
  flightStart = clock;
  arrow.style.opacity = '0';
  hint.style.opacity = '0';

  chant.classList.remove('show');
  void chant.offsetWidth;
  chant.classList.add('show');
}

function showResult(o) {
  document.getElementById('rEmoji').textContent   = o.emoji;
  document.getElementById('rFace').textContent    = '靴は「' + o.face + '」';
  document.getElementById('rWeather').textContent = o.weather;
  document.getElementById('rMsg').textContent      = o.msg;
  result.classList.add('show');
}

function reset() {
  result.classList.remove('show');
  chant.classList.remove('show');
  flight = null;
  state = 'idle';
  flyer.position.set(0, REST_Y, 0);
  pivot.rotation.set(0, 0, 0);
  setTimeout(() => {
    arrow.style.opacity = '';
    hint.style.opacity = '';
  }, 400);
}

// ---- 描画ループ ----
let last = performance.now();
function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  clock += dt * 1000;

  if (state === 'idle') {
    // ゆらゆら待機
    pivot.rotation.y += (Math.sin(clock / 900) * 0.25 - pivot.rotation.y) * 0.06;
    pivot.rotation.x += (0 - pivot.rotation.x) * 0.1;
    pivot.rotation.z += (0 - pivot.rotation.z) * 0.1;
    flyer.position.x += (0 - flyer.position.x) * 0.1;
    flyer.position.z += (0 - flyer.position.z) * 0.1;
    flyer.position.y += ((REST_Y + Math.sin(clock / 1100) * 0.05) - flyer.position.y) * 0.1;
  } else if (state === 'flying' && flight) {
    const u = Math.min(1, (clock - flightStart) / flight.dur);
    const arc = 4 * u * (1 - u);                 // 0→1→0 の放物線
    flyer.position.y = REST_Y + flight.upH * arc;
    flyer.position.x = flight.drift * u;
    flyer.position.z = flight.zPop * arc;
    pivot.rotation.x = flight.startRotX + (flight.endRotX - flight.startRotX) * u;
    pivot.rotation.y = flight.startRotY + (flight.endRotY - flight.startRotY) * u;
    pivot.rotation.z = flight.startRotZ + (flight.endRotZ - flight.startRotZ) * u;
    if (u >= 1) {
      state = 'result';
      showResult(flight.outcome);
    }
  }

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

// =========================================================
//   スワイプ操作（PC・スマホ両対応）
// =========================================================
let dragging = false;
let startY = 0, startX = 0, curY = 0, curX = 0;

function pointFromEvent(e) {
  const t = e.touches ? e.touches[0] : (e.changedTouches ? e.changedTouches[0] : e);
  return { x: t.clientX, y: t.clientY };
}
function onDown(e) {
  if (state === 'flying' || state === 'result') return;
  dragging = true;
  state = 'drag';
  const p = pointFromEvent(e);
  startX = curX = p.x; startY = curY = p.y;
  e.preventDefault();
}
function onMove(e) {
  if (!dragging) return;
  const p = pointFromEvent(e);
  curX = p.x; curY = p.y;
  const dy = Math.min(0, p.y - startY);
  const dx = (p.x - startX);
  // 引っぱりのプレビュー
  flyer.position.y = REST_Y + Math.min(1.4, -dy / 140);
  flyer.position.x = dx / 200;
  pivot.rotation.x = -dy / 260;
  pivot.rotation.y = dx / 300;
  e.preventDefault();
}
function onUp() {
  if (!dragging) return;
  dragging = false;
  const dy = startY - curY;
  const dx = curX - startX;
  if (dy > 40) {
    const power  = Math.min(1.4, Math.max(0.7, dy / 220));
    const driftX = dx / 160 + (Math.random() * 0.6 - 0.3);
    fly(power, driftX);
  } else {
    state = 'idle';   // 戻す（idleがなめらかに復帰）
  }
}

stage.addEventListener('mousedown', onDown);
stage.addEventListener('touchstart', onDown, { passive: false });
window.addEventListener('mousemove', onMove);
window.addEventListener('touchmove', onMove, { passive: false });
window.addEventListener('mouseup', onUp);
window.addEventListener('touchend', onUp);
again.addEventListener('click', reset);

// ---- リサイズ ----
window.addEventListener('resize', () => {
  const w = host.clientWidth, h = host.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
</body>
</html>
